<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的數學探索大廳</title>
    <style>
        :root {
            --bg-yellow: #FFF9E3;
            --card-white: #FFFFFF;
            --text-brown: #5D4037;
            --btn-green: #A8D08D;
            --accent-red: #E74C3C;
        }
        
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-yellow);
            color: var(--text-brown);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 畢業倒數計時器 (左上角) */
        #countdown-timer {
            position: fixed;
            top: 15px;
            left: 15px;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--btn-green);
            z-index: 1000;
            font-weight: bold;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        #countdown-timer span { color: var(--accent-red); font-size: 1.1rem; }

        header { text-align: center; margin: 60px 0 40px 0; }
        h1 { font-size: 2.2rem; color: #8D6E63; margin-bottom: 10px; }
        
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 100px; /* 預留底部空間給 QR Code */
        }

        .unit-card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border: 2px solid #F0E5CF;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s;
        }
        .unit-card:hover { transform: translateY(-5px); }
        
        .icon { font-size: 55px; margin-bottom: 15px; }
        h2 { margin: 10px 0; color: #6D4C41; }
        p { font-size: 1rem; color: #8D6E63; margin-bottom: 25px; line-height: 1.5; }
        
        .enter-btn {
            background-color: var(--btn-green);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            display: block;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .enter-btn:hover { background-color: #8EBC72; box-shadow: 0 4px 12px rgba(168,208,141,0.4); }

        /* QR Code 區域 (右下角固定) */
        .qrcode-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #ddd;
            z-index: 1000;
        }
        #qrcode img { 
            width: 120px; 
            height: 120px; 
            display: block;
        }
        .qrcode-text { font-size: 12px; margin-top: 5px; color: #888; font-weight: bold; }

        /* 手機板調整 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #countdown-timer { position: static; margin-bottom: 20px; width: 90%; text-align: center; }
            .qrcode-container { position: static; margin-top: 30px; display: inline-block; }
        }
    </style>
</head>
<body>

    <div id="countdown-timer">
        🎓 距離畢業還有：<br>
        <span id="timer-text">計算中...</span>
    </div>

    <header>
        <h1>🌟 我們的數學探索大廳 🌟</h1>
        <p>親愛的同學，今天我們要挑戰哪一個關卡呢？</p>
    </header>

    <div class="lobby-grid">
        <div class="unit-card">
            <div>
                <div class="icon">🦊🐱</div>
                <h2>速率：追趕問題</h2>
                <p>幫助奇奇追上妮妮，觀察速率差與追趕過程！</p>
            </div>
            <a href="race.html" class="enter-btn">點我挑戰</a>
        </div>

        <div class="unit-card">
            <div>
                <div class="icon">🚢🌊</div>
                <h2>速率：流水問題</h2>
                <p>體驗順流與逆流，觀察船速與水速的變化！</p>
            </div>
            <a href="boat.html" class="enter-btn">點我挑戰</a>
        </div>

        <div class="unit-card">
            <div>
                <div class="icon">🐰🐢</div>
                <h2>速率：相遇問題</h2>
                <p>兩地同時出發，算算看他們什麼時候會碰頭？</p>
            </div>
            <a href="meet.html" class="enter-btn">點我挑戰</a>
        </div>

         <div class="unit-card">
            <div>
                <div class="icon">🧊 📐</div>
                <h2>速率：體積問題</h2>
                <p>該怎麼計算呢？</p>
            </div>
            <a href="prism.html" class="enter-btn">點我挑戰</a>
        </div>

        <!-- 👇 這裡是新加入的進階題庫卡片 👇 -->
        <div class="unit-card">
            <div>
                <div class="icon">🧮💡</div>
                <h2>進階應用題庫</h2>
                <p>雞兔同籠、年齡問題、和差問題綜合實戰！</p>
            </div>
            <a href="math-practice.html" class="enter-btn">點我挑戰</a>
        </div>
        <!-- 👆 新加入的進階題庫卡片 👆 -->
    </div>

    <div class="qrcode-container">
        <div id="qrcode"></div>
        <div class="qrcode-text">掃描進入大廳</div>
    </div>

    <script>
        // 1. 畢業倒數計時邏輯
        function updateTimer() {
            const gradDate = new Date("June 15, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = gradDate - now;

            if (diff <= 0) {
                document.getElementById("timer-text").innerHTML = "畢業快樂！🎓";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer-text").innerHTML = 
                `${days}天 ${hours}時 ${minutes}分 ${seconds}秒`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 2. 自動產生 QR Code (使用穩定的 QRServer API)
        window.onload = function() {
            const currentUrl = window.location.href;
            const qrcodeDiv = document.getElementById('qrcode');
            
            const qrImg = document.createElement('img');
            // 構建 API 網址
            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(currentUrl);
            qrImg.alt = "QR Code";
            
            qrcodeDiv.appendChild(qrImg);
        };
    </script>

</body>
</html>
