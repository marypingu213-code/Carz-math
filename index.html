<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的數學探索大廳</title>
    <style>
        :root {
            --bg-yellow: #FFF9E3;
            --card-white: #FFFFFF;
            --text-brown: #5D4037;
            --btn-green: #A8D08D;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-yellow);
            color: var(--text-brown);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin: 40px 0; }
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .unit-card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #F0E5CF;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .icon { font-size: 50px; margin-bottom: 10px; }
        .enter-btn {
            background-color: var(--btn-green);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌟 我們的數學探索大廳 🌟</h1>
        <p>今天要挑戰哪一個主題呢？</p>
    </header>

    <div class="lobby-grid">
        <div class="unit-card">
            <div>
                <div class="icon">🦊🐱</div>
                <h2>速率：追趕問題</h2>
                <p>觀察奇奇與妮妮，學習計算追趕距離！</p>
            </div>
            <a href="race.html" class="enter-btn">點我挑戰</a>
        </div>

        <div class="unit-card">
            <div>
                <div class="icon">🚢🌊</div>
                <h2>速率：流水問題</h2>
                <p>體驗順流與逆流，算出遊艇的時間！</p>
            </div>
            <a href="boat.html" class="enter-btn">點我挑戰</a>
        </div>

        <div class="unit-card">
            <div>
                <div class="icon">🐰🐢</div>
                <h2>速率：相遇問題</h2>
                <p>大家從兩地對跑，什麼時候會碰到呢？</p>
            </div>
            <a href="meet.html" class="enter-btn">點我挑戰</a>
        </div>
    </div>

</body>
</html>
