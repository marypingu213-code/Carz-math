<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小學數學進階題庫</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 引入 Babel 來解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 定義圖示 (SVG)
    const Icons = {
      Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
      BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
      Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"></path><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"></path><path d="M3.477 10.896a4 4 0 0 1 .585-.396"></path><path d="M19.938 10.5a4 4 0 0 1 .585.396"></path><path d="M6 18a4 4 0 0 1-1.967-.516"></path><path d="M19.967 17.484A4 4 0 0 1 18 18"></path></svg>,
      ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="m6 9 6 6 6-6"></path></svg>,
      ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="m18 15-6-6-6 6"></path></svg>,
      Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-yellow-500 animate-pulse"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
    };

    // 題目資料庫
    const questionBank = {
      'chicken-rabbit': {
        title: '雞兔同籠問題',
        icon: <Icons.Calculator />,
        color: 'bg-orange-100 text-orange-800 border-orange-200',
        questions: [
          {
            id: 'c1',
            emoji: '🐔🐰',
            q: '農場裡有雞和兔共有 10 隻，腳共有 32 隻。請問雞和兔各幾隻？',
            a: '雞 4 隻，兔 6 隻',
            exp: '假設全部都是兔子，應該有 10 × 4 = 40 隻腳。比實際多了 40 - 32 = 8 隻腳。因為每把一隻兔子換成雞，腳就會少 2 隻，所以雞有 8 ÷ 2 = 4 隻。兔子有 10 - 4 = 6 隻。'
          },
          {
            id: 'c2',
            emoji: '🚗🛵',
            q: '停車場有汽車（4輪）和機車（2輪）共 15 輛，輪子共有 46 個。請問汽車和機車各幾輛？',
            a: '汽車 8 輛，機車 7 輛',
            exp: '假設全部都是機車，應該有 15 × 2 = 30 個輪子。比實際少了 46 - 30 = 16 個輪子。因為每把一輛機車換成汽車，輪子會多 2 個，所以汽車有 16 ÷ 2 = 8 輛。機車有 15 - 8 = 7 輛。'
          },
          {
            id: 'c3',
            emoji: '📝💯',
            q: '數學測驗共 20 題，答對一題得 5 分，答錯或不答一題扣 2 分。小明最後得到 72 分，請問他答對了幾題？',
            a: '答對 16 題',
            exp: '假設 20 題全對，應該得 20 × 5 = 100 分。實際少了 100 - 72 = 28 分。答錯一題不僅得不到 5 分，還要扣 2 分，一來一往差了 5 + 2 = 7 分。所以答錯了 28 ÷ 7 = 4 題。答對 20 - 4 = 16 題。'
          },
          {
            id: 'c4',
            emoji: '🪙💰',
            q: '小華的存錢筒裡有 10 元硬幣和 50 元硬幣共 12 個，總金額是 320 元。請問兩種硬幣各有幾個？',
            a: '10元 7 個，50元 5 個',
            exp: '假設全部都是 10 元硬幣，總金額是 12 × 10 = 120 元。比實際少了 320 - 120 = 200 元。每把一個 10 元換成 50 元，金額會增加 40 元。所以 50 元硬幣有 200 ÷ 40 = 5 個。10 元硬幣有 12 - 5 = 7 個。'
          },
          {
            id: 'c5',
            emoji: '🕷️🦟',
            q: '蜘蛛（8條腿）和蜻蜓（6條腿）共有 10 隻，牠們的腿總共有 74 條。請問蜘蛛和蜻蜓各幾隻？',
            a: '蜘蛛 7 隻，蜻蜓 3 隻',
            exp: '假設全部都是蜻蜓，應該有 10 × 6 = 60 條腿。比實際少了 74 - 60 = 14 條腿。每把一隻蜻蜓換成蜘蛛，腿會多 2 條。所以蜘蛛有 14 ÷ 2 = 7 隻。蜻蜓有 10 - 7 = 3 隻。'
          }
        ]
      },
      'age': {
        title: '年齡問題',
        icon: <Icons.BookOpen />,
        color: 'bg-blue-100 text-blue-800 border-blue-200',
        questions: [
          {
            id: 'a1',
            emoji: '👨👦',
            q: '爸爸今年 40 歲，兒子今年 10 歲。請問幾年後，爸爸的年齡是兒子的 2 倍？',
            a: '20 年後',
            exp: '年齡差永遠不變。爸爸和兒子的年齡差是 40 - 10 = 30 歲。當爸爸年齡是兒子 2 倍時，兩人的年齡差剛好等於兒子的年齡（2倍 - 1倍 = 1倍）。所以那時兒子是 30 歲。現在兒子 10 歲，所以需要 30 - 10 = 20 年後。'
          },
          {
            id: 'a2',
            emoji: '👩👧',
            q: '媽媽今年 36 歲，女兒今年 8 歲。請問幾年前，媽媽的年齡是女兒的 8 倍？',
            a: '4 年前',
            exp: '兩人年齡差是 36 - 8 = 28 歲。當媽媽是女兒 8 倍時，年齡差是女兒的 7 倍 (8-1=7)。所以那時女兒的年齡是 28 ÷ 7 = 4 歲。現在女兒 8 歲，所以是 8 - 4 = 4 年前。'
          },
          {
            id: 'a3',
            emoji: '👴👦',
            q: '爺爺今年 72 歲，孫子今年 12 歲。請問幾年後，爺爺和孫子的年齡加起來剛好是 100 歲？',
            a: '8 年後',
            exp: '兩人現在的年齡和是 72 + 12 = 84 歲。目標是 100 歲，還差 100 - 84 = 16 歲。因為每過一年，兩人總共會增加 2 歲，所以需要 16 ÷ 2 = 8 年後。'
          },
          {
            id: 'a4',
            emoji: '👦🧒',
            q: '哥哥今年 15 歲，弟弟今年 9 歲。當哥哥的年齡是弟弟的 2 倍時，哥哥幾歲？',
            a: '哥哥 12 歲',
            exp: '兩人年齡差是 15 - 9 = 6 歲。當哥哥是弟弟的 2 倍時，年齡差剛好等於弟弟的年齡。所以那時弟弟是 6 歲。哥哥就是 6 × 2 = 12 歲。（這發生在 3 年前）'
          },
          {
            id: 'a5',
            emoji: '👨👦👦',
            q: '父親今年 45 歲，兩個兒子的年齡分別是 12 歲和 8 歲。幾年後，兩個兒子的年齡和會等於父親的年齡？',
            a: '25 年後',
            exp: '現在父親比兩個兒子的年齡和多了 45 - (12 + 8) = 25 歲。每過一年，父親增加 1 歲，但兩個兒子總共會增加 2 歲。也就是說，兒子們的年齡和每年會追趕父親 1 歲。要追上 25 歲的差距，需要 25 年。'
          }
        ]
      },
      'sum-diff': {
        title: '和差問題',
        icon: <Icons.Brain />,
        color: 'bg-emerald-100 text-emerald-800 border-emerald-200',
        questions: [
          {
            id: 's1',
            emoji: '⚖️🔢',
            q: '甲、乙兩數之和為 50，兩數之差為 12。請問甲、乙兩數（大數與小數）分別是多少？',
            a: '大數 31，小數 19',
            exp: '和差問題公式：大數 = (和 + 差) ÷ 2，小數 = (和 - 差) ÷ 2。大數 = (50 + 12) ÷ 2 = 31；小數 = (50 - 12) ÷ 2 = 19。'
          },
          {
            id: 's2',
            emoji: '👦🧒💵',
            q: '哥哥和弟弟共有 120 元，哥哥比弟弟多 30 元。請問哥哥和弟弟各有幾元？',
            a: '哥哥 75 元，弟弟 45 元',
            exp: '和為 120，差為 30。哥哥（大數）= (120 + 30) ÷ 2 = 75 元。弟弟（小數）= (120 - 30) ÷ 2 = 45 元。'
          },
          {
            id: 's3',
            emoji: '📏📐',
            q: '一個長方形的周長是 40 公分，已知長比寬多 4 公分。請問這個長方形的長和寬各是多少公分？',
            a: '長 12 公分，寬 8 公分',
            exp: '注意陷阱！周長是 40，所以「長 + 寬」是 40 ÷ 2 = 20 公分。這才是「和」。長比寬多 4（差）。長 = (20 + 4) ÷ 2 = 12 公分；寬 = (20 - 4) ÷ 2 = 8 公分。'
          },
          {
            id: 's4',
            emoji: '👧👩🍓',
            q: '姐姐和妹妹去採草莓，兩人共採了 68 顆。如果姐姐給妹妹 6 顆，兩人的草莓就一樣多。請問兩人原本各採了幾顆？',
            a: '姐姐 40 顆，妹妹 28 顆',
            exp: '注意陷阱！姐姐給妹妹 6 顆後一樣多，代表原本姐姐比妹妹多 12 顆 (6 × 2 = 12)！和為 68，差為 12。姐姐 = (68 + 12) ÷ 2 = 40 顆；妹妹 = (68 - 12) ÷ 2 = 28 顆。'
          },
          {
            id: 's5',
            emoji: '🏫🧑‍🤝‍🧑',
            q: '甲班和乙班共有學生 86 人。如果從甲班轉 3 個學生到乙班，兩班人數就相等了。請問甲班和乙班原來各有多少人？',
            a: '甲班 46 人，乙班 40 人',
            exp: '甲班給乙班 3 人後相等，代表原來甲班比乙班多 6 人 (3 × 2 = 6)。和為 86，差為 6。甲班 = (86 + 6) ÷ 2 = 46 人；乙班 = (86 - 6) ÷ 2 = 40 人。'
          }
        ]
      }
    };

    const QuestionCard = ({ question, index }) => {
      const [showAnswer, setShowAnswer] = useState(false);

      return (
        <div 
          className="group bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-5 transition-all duration-300 hover:shadow-lg hover:border-indigo-300 hover:-translate-y-1 relative overflow-hidden"
          style={{ animation: `fadeIn 0.5s ease-out ${index * 0.1}s both` }}
        >
          {/* 裝飾性背景圓塊 */}
          <div className="absolute -right-6 -top-6 w-24 h-24 bg-indigo-50 rounded-full opacity-50 group-hover:scale-150 transition-transform duration-500"></div>

          <div className="flex items-start gap-4 relative z-10">
            {/* 動態圖示區塊 */}
            <div className="flex flex-col items-center gap-2 mt-1">
              <div className="flex-shrink-0 w-16 h-16 bg-indigo-50 border-2 border-indigo-100 rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:bg-indigo-100 group-hover:rotate-6 transition-all duration-300">
                <span className={`transform transition-transform duration-300 ${showAnswer ? 'scale-125 animate-bounce' : 'group-hover:scale-110'}`}>
                  {question.emoji}
                </span>
              </div>
              <div className="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                第 {index + 1} 題
              </div>
            </div>

            <div className="flex-grow pt-1">
              <p className="text-lg text-slate-800 font-medium mb-4 leading-relaxed">{question.q}</p>
              
              <button
                onClick={() => setShowAnswer(!showAnswer)}
                className={`flex items-center gap-2 font-bold px-4 py-2 rounded-xl transition-all duration-300 ${
                  showAnswer 
                    ? 'bg-indigo-100 text-indigo-700' 
                    : 'bg-slate-100 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600'
                }`}
              >
                {showAnswer ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                {showAnswer ? '收起解答' : '看解答與解析'}
              </button>

              {/* 解答與解析動畫展開區塊 */}
              <div className={`grid transition-all duration-300 ease-in-out ${showAnswer ? 'grid-rows-[1fr] opacity-100 mt-4' : 'grid-rows-[0fr] opacity-0'}`}>
                <div className="overflow-hidden">
                  <div className="p-4 bg-gradient-to-br from-indigo-50 to-blue-50 rounded-xl border border-indigo-100">
                    <div className="flex items-center gap-2 text-indigo-700 font-bold mb-3 text-lg">
                      <Icons.Lightbulb />
                      <span>答案：{question.a}</span>
                    </div>
                    <div className="bg-white/70 p-4 rounded-lg border border-indigo-50 shadow-inner">
                      <p className="text-slate-700 leading-relaxed">
                        <span className="inline-block bg-indigo-200 text-indigo-800 text-xs px-2 py-1 rounded mb-2 mr-2 font-bold">解題思路</span>
                        <br/>
                        {question.exp}
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('chicken-rabbit');

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans">
          <div className="max-w-4xl mx-auto">
            
            {/* Header */}
            <header className="text-center mb-10">
              <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-3 flex items-center justify-center gap-3">
                <div className="text-indigo-600"><Icons.Calculator /></div>
                小學數學進階題庫
              </h1>
              <p className="text-slate-500 text-lg">雞兔同籠、年齡問題、和差問題實戰練習</p>
            </header>

            {/* Tab Navigation */}
            <div className="flex flex-col md:flex-row gap-2 mb-8">
              {Object.entries(questionBank).map(([key, data]) => (
                <button
                  key={key}
                  onClick={() => setActiveTab(key)}
                  className={`flex-1 flex items-center justify-center gap-2 py-4 px-6 rounded-xl font-bold text-lg transition-all duration-200 ${
                    activeTab === key
                      ? `${data.color} shadow-sm border-2 transform scale-[1.02]`
                      : 'bg-white text-slate-500 hover:bg-slate-100 border-2 border-transparent'
                  }`}
                >
                  {data.icon}
                  {data.title}
                </button>
              ))}
            </div>

            {/* Content Area */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 md:p-6">
              <div className="mb-6 px-4 pt-2">
                <h2 className="text-2xl font-bold text-slate-800 border-b-2 border-slate-100 pb-4 flex items-center gap-2">
                  <div className={questionBank[activeTab].color.split(' ')[1]}>{questionBank[activeTab].icon}</div>
                  {questionBank[activeTab].title} 練習題
                </h2>
              </div>
              
              <div className="space-y-2">
                {questionBank[activeTab].questions.map((q, index) => (
                  <QuestionCard key={q.id} question={q} index={index} />
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // 啟動 React 應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
