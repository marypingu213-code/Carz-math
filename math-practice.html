<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小學數學進階題庫 - 互動操作版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 避免在白板上畫圖時螢幕跟著滾動 */
    .touch-none { touch-action: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // 圖示元件庫
    const Icons = {
      Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
      BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
      Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"></path><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"></path><path d="M3.477 10.896a4 4 0 0 1 .585-.396"></path><path d="M19.938 10.5a4 4 0 0 1 .585.396"></path><path d="M6 18a4 4 0 0 1-1.967-.516"></path><path d="M19.967 17.484A4 4 0 0 1 18 18"></path></svg>,
      Pen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.58 7.58"></path><circle cx="11" cy="11" r="2"></circle></svg>,
      Eraser: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>,
      ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><polyline points="20 6 9 17 4 12"></polyline></svg>,
      Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-yellow-500 animate-pulse"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
    };

    // 題目資料庫 (加入 inputs 定義，方便自動批改)
    const questionBank = {
      'chicken-rabbit': {
        title: '雞兔同籠問題',
        icon: <Icons.Calculator />,
        color: 'bg-orange-100 text-orange-800 border-orange-200',
        btnColor: 'bg-orange-500 hover:bg-orange-600',
        questions: [
          {
            id: 'c1', emoji: '🐔🐰',
            q: '農場裡有雞和兔共有 10 隻，腳共有 32 隻。請問雞和兔各幾隻？',
            inputs: [{ label: '雞有', unit: '隻', val: '4' }, { label: '兔有', unit: '隻', val: '6' }],
            exp: '假設全部都是兔子，應該有 10 × 4 = 40 隻腳。比實際多了 40 - 32 = 8 隻腳。因為每把一隻兔子換成雞，腳就會少 2 隻，所以雞有 8 ÷ 2 = 4 隻。兔子有 10 - 4 = 6 隻。'
          },
          {
            id: 'c2', emoji: '🚗🛵',
            q: '停車場有汽車（4輪）和機車（2輪）共 15 輛，輪子共有 46 個。請問汽車和機車各幾輛？',
            inputs: [{ label: '汽車有', unit: '輛', val: '8' }, { label: '機車有', unit: '輛', val: '7' }],
            exp: '假設全部都是機車，應該有 15 × 2 = 30 個輪子。比實際少了 46 - 30 = 16 個輪子。因為每把一輛機車換成汽車，輪子會多 2 個，所以汽車有 16 ÷ 2 = 8 輛。機車有 15 - 8 = 7 輛。'
          },
          {
            id: 'c3', emoji: '📝💯',
            q: '數學測驗共 20 題，答對一題得 5 分，答錯或不答一題扣 2 分。小明最後得到 72 分，請問他答對了幾題？',
            inputs: [{ label: '答對了', unit: '題', val: '16' }],
            exp: '假設 20 題全對，應該得 20 × 5 = 100 分。實際少了 100 - 72 = 28 分。答錯一題不僅得不到 5 分，還要扣 2 分，一來一往差了 5 + 2 = 7 分。所以答錯了 28 ÷ 7 = 4 題。答對 20 - 4 = 16 題。'
          }
        ]
      },
      'age': {
        title: '年齡問題',
        icon: <Icons.BookOpen />,
        color: 'bg-blue-100 text-blue-800 border-blue-200',
        btnColor: 'bg-blue-500 hover:bg-blue-600',
        questions: [
          {
            id: 'a1', emoji: '👨👦',
            q: '爸爸今年 40 歲，兒子今年 10 歲。請問幾年後，爸爸的年齡是兒子的 2 倍？',
            inputs: [{ label: '需要', unit: '年後', val: '20' }],
            exp: '年齡差永遠不變。爸爸和兒子的年齡差是 40 - 10 = 30 歲。當爸爸年齡是兒子 2 倍時，兩人的年齡差剛好等於兒子的年齡（2倍 - 1倍 = 1倍）。所以那時兒子是 30 歲。現在兒子 10 歲，所以需要 30 - 10 = 20 年後。'
          },
          {
            id: 'a2', emoji: '👩👧',
            q: '媽媽今年 36 歲，女兒今年 8 歲。請問幾年前，媽媽的年齡是女兒的 8 倍？',
            inputs: [{ label: '那是', unit: '年前', val: '4' }],
            exp: '兩人年齡差是 36 - 8 = 28 歲。當媽媽是女兒 8 倍時，年齡差是女兒的 7 倍 (8-1=7)。所以那時女兒的年齡是 28 ÷ 7 = 4 歲。現在女兒 8 歲，所以是 8 - 4 = 4 年前。'
          },
          {
            id: 'a3', emoji: '👨👦👦',
            q: '父親今年 45 歲，兩個兒子的年齡分別是 12 歲和 8 歲。幾年後，兩個兒子的年齡和會等於父親的年齡？',
            inputs: [{ label: '需要', unit: '年後', val: '25' }],
            exp: '現在父親比兩個兒子的年齡和多了 45 - (12 + 8) = 25 歲。每過一年，父親增加 1 歲，但兩個兒子總共會增加 2 歲。也就是說，兒子們的年齡和每年會追趕父親 1 歲。要追上 25 歲的差距，需要 25 年。'
          }
        ]
      },
      'sum-diff': {
        title: '和差問題',
        icon: <Icons.Brain />,
        color: 'bg-emerald-100 text-emerald-800 border-emerald-200',
        btnColor: 'bg-emerald-500 hover:bg-emerald-600',
        questions: [
          {
            id: 's1', emoji: '⚖️🔢',
            q: '甲、乙兩數之和為 50，兩數之差為 12。請問大數與小數分別是多少？',
            inputs: [{ label: '大數是', unit: '', val: '31' }, { label: '小數是', unit: '', val: '19' }],
            exp: '和差問題公式：大數 = (和 + 差) ÷ 2，小數 = (和 - 差) ÷ 2。大數 = (50 + 12) ÷ 2 = 31；小數 = (50 - 12) ÷ 2 = 19。'
          },
          {
            id: 's2', emoji: '📏📐',
            q: '一個長方形的周長是 40 公分，已知長比寬多 4 公分。請問長和寬各是多少公分？',
            inputs: [{ label: '長是', unit: '公分', val: '12' }, { label: '寬是', unit: '公分', val: '8' }],
            exp: '注意陷阱！周長是 40，所以「長 + 寬」是 40 ÷ 2 = 20 公分。這才是「和」。長比寬多 4（差）。長 = (20 + 4) ÷ 2 = 12 公分；寬 = (20 - 4) ÷ 2 = 8 公分。'
          },
          {
            id: 's3', emoji: '👧👩🍓',
            q: '姐姐和妹妹去採草莓，兩人共採了 68 顆。如果姐姐給妹妹 6 顆，兩人的草莓就一樣多。請問兩人原本各採了幾顆？',
            inputs: [{ label: '姐姐原本', unit: '顆', val: '40' }, { label: '妹妹原本', unit: '顆', val: '28' }],
            exp: '注意陷阱！姐姐給妹妹 6 顆後一樣多，代表原本姐姐比妹妹多 12 顆 (6 × 2 = 12)！和為 68，差為 12。姐姐 = (68 + 12) ÷ 2 = 40 顆；妹妹 = (68 - 12) ÷ 2 = 28 顆。'
          }
        ]
      }
    };

    // --- 小白板元件 ---
    const Whiteboard = () => {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [tool, setTool] = useState('pen'); // 'pen' or 'eraser'

      // 設定 Canvas 尺寸
      useEffect(() => {
        const canvas = canvasRef.current;
        const parent = canvas.parentElement;
        canvas.width = parent.clientWidth;
        canvas.height = parent.clientHeight;
        
        // 為了讓畫出來的線條平滑
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }, []);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
          };
        }
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      };

      const startDrawing = (e) => {
        e.preventDefault(); // 防止滾動
        setIsDrawing(true);
        const coords = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault(); // 防止滾動
        const coords = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        
        if (tool === 'eraser') {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 20;
        } else {
          ctx.strokeStyle = '#334155'; // slate-700
          ctx.lineWidth = 3;
        }
        
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        setIsDrawing(false);
      };

      const clearBoard = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      };

      return (
        <div className="flex flex-col h-full border-2 border-slate-300 rounded-xl bg-white overflow-hidden shadow-inner">
          <div className="bg-slate-100 p-2 border-b-2 border-slate-200 flex justify-between items-center">
            <span className="text-sm font-bold text-slate-500 ml-2">📝 計算紙 (可觸控書寫)</span>
            <div className="flex gap-2">
              <button 
                onClick={() => setTool('pen')}
                className={`p-2 rounded-lg transition-colors ${tool === 'pen' ? 'bg-indigo-500 text-white' : 'bg-white text-slate-600 hover:bg-slate-200'}`}
                title="畫筆"
              >
                <Icons.Pen />
              </button>
              <button 
                onClick={() => setTool('eraser')}
                className={`p-2 rounded-lg transition-colors ${tool === 'eraser' ? 'bg-indigo-500 text-white' : 'bg-white text-slate-600 hover:bg-slate-200'}`}
                title="橡皮擦"
              >
                <Icons.Eraser />
              </button>
              <div className="w-px bg-slate-300 mx-1"></div>
              <button 
                onClick={clearBoard}
                className="p-2 rounded-lg bg-white text-red-500 hover:bg-red-50 transition-colors"
                title="全部清除"
              >
                <Icons.Trash />
              </button>
            </div>
          </div>
          <div className="flex-grow relative touch-none">
            <canvas
              ref={canvasRef}
              className="absolute inset-0 w-full h-full cursor-crosshair"
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseOut={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
            />
          </div>
        </div>
      );
    };


    // --- 獨立解題工作區元件 ---
    const Workspace = ({ category, question, onBack }) => {
      const [answers, setAnswers] = useState(Array(question.inputs.length).fill(''));
      const [feedback, setFeedback] = useState(null); // 'correct', 'wrong', null
      const [showExp, setShowExp] = useState(false);

      const handleInputChange = (index, value) => {
        const newAnswers = [...answers];
        newAnswers[index] = value;
        setAnswers(newAnswers);
        setFeedback(null); // 重新輸入就清除回饋
      };

      const checkAnswer = () => {
        let isAllCorrect = true;
        for (let i = 0; i < question.inputs.length; i++) {
          // 容忍全形數字或前後空白
          const userAns = answers[i].trim().replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 65248));
          if (userAns !== question.inputs[i].val) {
            isAllCorrect = false;
            break;
          }
        }
        setFeedback(isAllCorrect ? 'correct' : 'wrong');
        if(isAllCorrect) setShowExp(true);
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col" style={{ animation: 'fadeIn 0.4s ease-out' }}>
          {/* 頂部導覽列 */}
          <div className={`${category.btnColor} text-white p-4 shadow-md flex items-center justify-between sticky top-0 z-10`}>
            <button onClick={onBack} className="flex items-center gap-2 font-bold bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl transition">
              <Icons.ArrowLeft /> 回上一頁
            </button>
            <h2 className="font-bold text-lg hidden sm:block">{category.title} - 解題站</h2>
            <div className="w-10"></div> {/* 平衡用 */}
          </div>

          <div className="flex-grow flex flex-col md:flex-row gap-4 p-4 md:p-6 max-w-6xl mx-auto w-full h-[calc(100vh-72px)]">
            
            {/* 左側：題目與輸入區 */}
            <div className="w-full md:w-1/3 flex flex-col gap-4 h-full overflow-y-auto">
              
              {/* 題目卡 */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex-shrink-0">
                <div className="text-4xl mb-4 text-center">{question.emoji}</div>
                <h3 className="text-xl font-bold text-slate-800 leading-relaxed">{question.q}</h3>
              </div>

              {/* 作答區 */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col">
                <h4 className="font-bold text-slate-600 mb-4 border-b pb-2">✏️ 請輸入你的答案：</h4>
                
                <div className="space-y-4 mb-6">
                  {question.inputs.map((inp, idx) => (
                    <div key={idx} className="flex items-center gap-3">
                      <label className="font-bold text-slate-700 whitespace-nowrap">{inp.label}</label>
                      <input 
                        type="number" 
                        className="flex-grow border-2 border-slate-300 rounded-xl px-4 py-2 text-lg font-bold text-center focus:border-indigo-500 focus:outline-none"
                        value={answers[idx]}
                        onChange={(e) => handleInputChange(idx, e.target.value)}
                        placeholder="?"
                      />
                      <span className="text-slate-500 whitespace-nowrap">{inp.unit}</span>
                    </div>
                  ))}
                </div>

                <button 
                  onClick={checkAnswer}
                  className={`w-full py-3 rounded-xl font-bold text-white text-lg flex items-center justify-center gap-2 transition-all ${category.btnColor} shadow-md`}
                >
                  <Icons.Check /> 送出批改
                </button>

                {/* 批改回饋 */}
                {feedback === 'correct' && (
                  <div className="mt-4 p-4 bg-green-100 text-green-800 rounded-xl font-bold text-center border border-green-200 animate-bounce">
                    🎉 太棒了！答對囉！
                  </div>
                )}
                {feedback === 'wrong' && (
                  <div className="mt-4 p-4 bg-red-100 text-red-800 rounded-xl font-bold text-center border border-red-200">
                    ❌ 好像不太對喔，再算算看！
                  </div>
                )}

                {/* 解析區 (可手動展開或答對時自動展開) */}
                <div className="mt-auto pt-6">
                  <button 
                    onClick={() => setShowExp(!showExp)}
                    className="w-full text-slate-500 font-bold hover:text-slate-700 underline text-sm pb-2"
                  >
                    {showExp ? '收起提示與解析' : '💡 解不出來嗎？看提示'}
                  </button>
                  
                  {showExp && (
                    <div className="p-4 bg-yellow-50 rounded-xl border border-yellow-200 text-slate-700 text-sm leading-relaxed" style={{ animation: 'fadeIn 0.3s ease-out' }}>
                       <span className="font-bold text-yellow-700">解題思路：</span><br/>
                       {question.exp}
                    </div>
                  )}
                </div>

              </div>
            </div>

            {/* 右側：小白板 */}
            <div className="w-full md:w-2/3 h-[50vh] md:h-full flex-shrink-0">
              <Whiteboard />
            </div>

          </div>
        </div>
      );
    };


    // --- 主選單元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('chicken-rabbit');
      const [selectedQuestion, setSelectedQuestion] = useState(null);

      // 如果有選擇題目，就顯示工作區
      if (selectedQuestion) {
        return (
          <Workspace 
            category={questionBank[activeTab]} 
            question={selectedQuestion} 
            onBack={() => setSelectedQuestion(null)} 
          />
        );
      }

      // 否則顯示題庫列表
      return (
        <div className="min-h-screen p-4 md:p-8 font-sans max-w-5xl mx-auto">
          <header className="text-center mb-10 mt-4">
            <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-3 flex items-center justify-center gap-3">
              <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600"><Icons.Calculator /></div>
              數學進階挑戰站
            </h1>
            <p className="text-slate-500 text-lg">準備好紙筆，或是直接用內建小白板挑戰吧！</p>
          </header>

          {/* 類別切換 */}
          <div className="flex flex-col md:flex-row gap-3 mb-8">
            {Object.entries(questionBank).map(([key, data]) => (
              <button
                key={key}
                onClick={() => setActiveTab(key)}
                className={`flex-1 flex items-center justify-center gap-2 py-4 px-6 rounded-2xl font-bold text-lg transition-all duration-300 ${
                  activeTab === key
                    ? `${data.color} shadow-md border-2 scale-105`
                    : 'bg-white text-slate-500 hover:bg-slate-100 border-2 border-transparent shadow-sm'
                }`}
              >
                {data.icon}
                {data.title}
              </button>
            ))}
          </div>

          {/* 題目列表 */}
          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 md:p-8">
            <div className="mb-6 border-b-2 border-slate-100 pb-4">
              <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                請選擇要挑戰的關卡：
              </h2>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {questionBank[activeTab].questions.map((q, index) => (
                <div 
                  key={q.id} 
                  onClick={() => setSelectedQuestion(q)}
                  className={`group cursor-pointer bg-slate-50 rounded-2xl p-5 border-2 border-slate-200 transition-all duration-300 hover:shadow-lg hover:-translate-y-1 hover:border-transparent ${activeTab === 'chicken-rabbit' ? 'hover:bg-orange-50' : activeTab === 'age' ? 'hover:bg-blue-50' : 'hover:bg-emerald-50'}`}
                  style={{ animation: `fadeIn 0.3s ease-out ${index * 0.1}s both` }}
                >
                  <div className="flex items-center gap-4 mb-3">
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-white shadow-sm group-hover:scale-110 transition-transform`}>
                      {q.emoji}
                    </div>
                    <div className="font-bold text-slate-500 bg-white px-3 py-1 rounded-full text-sm border border-slate-200">
                      第 {index + 1} 關
                    </div>
                  </div>
                  <p className="text-lg text-slate-700 font-medium line-clamp-2">{q.q}</p>
                  <div className="mt-4 flex justify-end">
                    <span className={`text-sm font-bold px-4 py-2 rounded-xl text-white ${questionBank[activeTab].btnColor} transition-transform group-hover:scale-105 shadow-sm`}>
                      進入挑戰 🚀
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
