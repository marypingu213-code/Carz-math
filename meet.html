<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>速率三部曲：兩車並排修正版</title>
<style>
  :root {
    --bg-yellow: #FFF9E3;
    --highlight-yellow: #f1c40f; 
  }
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-yellow); display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
  .card { background: white; width: 95vw; height: 92vh; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
  .track { background: #444; flex: 0 0 240px; border-radius: 15px; position: relative; margin: 10px 0; border: 4px solid #333; overflow: visible; }
  
  /* 遙控車樣式 */
  .runner { position: absolute; font-size: 65px; transition: all 2s linear; z-index: 10; display: flex; flex-direction: column; align-items: center; }
  .car-label { 
    font-size: 24px; color: black; background: white; padding: 6px 14px; border-radius: 10px; margin-top: -10px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.3); font-weight: bold; border: 3px solid #333; white-space: nowrap;
  }
  
  /* 距離線與亮黃色數字 */
  .distance-line { position: absolute; bottom: 45px; left: 7%; width: 86%; height: 12px; background: #bdc3c7; border-radius: 6px; border: 2px solid white; }
  .line-text { 
    position: absolute; width: 100%; text-align: center; bottom: 10px; 
    font-weight: 900; color: var(--highlight-yellow); font-size: 26px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  }

  .formula-display { background: #e8f4fd; color: #0984e3; padding: 12px; border-radius: 12px; font-size: 28px; font-weight: bold; margin: 10px 0; display: none; border: 2px dashed #0984e3; }
  .step-area { flex: 1; margin-top: 15px; position: relative; }
  .step { display: none; background: #FFFDF0; border: 3px solid #FFD966; border-radius: 15px; padding: 15px; height: 100%; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .active { display: flex; }
  input { font-size: 32px; width: 180px; text-align: center; border: 3px solid #FFD966; border-radius: 12px; padding: 8px; margin: 10px; font-weight: bold; }
  button { background: #f1c40f; color: #333; border: none; padding: 15px 45px; border-radius: 50px; font-size: 24px; cursor: pointer; font-weight: bold; box-shadow: 0 4px #d4ac0d; }
</style>
</head>
<body>
<div class="card">
  <div id="q-header">
    <div id="q-title" style="font-size:24px; font-weight:bold; color:#d63031;">載入中...</div>
    <div id="q-desc" style="font-size:20px; line-height:1.4; color:#2d3436; margin: 8px 0;">載入中...</div>
  </div>
  
  <div class="track">
    <div id="blue-car" class="runner" style="top: 15px;">
        <div style="display:inline-block;" id="blue-img">🚙</div>
        <div class="car-label" id="label-blue">綠車</div>
    </div>
    <div id="red-car" class="runner" style="top: 105px;">
        <div style="display:inline-block;" id="red-img">🚗</div>
        <div class="car-label" id="label-red">橘車</div>
    </div>
    <div class="distance-line"><div class="line-text" id="label-dist">---</div></div>
  </div>

  <div class="step-area">
    <div id="s1" class="step active">
        <h3 style="font-size:26px; margin:0;">第一步：速率變化規律</h3>
        <p style="font-size:22px; margin:10px 0;">每分鐘<span id="s1-word">變化</span>多少公尺？</p>
        <div id="formula1" class="formula-display"></div>
        <input type="number" id="ans1" placeholder="寫下答案">
        <button onclick="check1()">確認</button>
    </div>
    <div id="s2" class="step">
        <h3 style="font-size:26px; margin:0;">第二步：最後相距/時間</h3>
        <div id="formula2" class="formula-display"></div>
        <input type="number" id="ans2" placeholder="寫下答案">
        <button onclick="check2()">看車子跑！</button>
    </div>
    <div id="final" class="step" style="background:#E8F8F5;">
      <h3 style="font-size:32px; color:#27ae60;">🎉 挑戰成功！</h3>
      <div id="final-summary" style="font-size:24px; font-weight:bold;"></div>
      <button onclick="location.reload()" style="background:#A8D08D; margin-top:20px;">下一題</button>
      <a href="index.html" style="font-weight:bold; color:#5D4037; text-decoration:none; margin-top:20px; font-size:20px; border-bottom:2px solid;">🏠 回到大廳</a>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      type: "相向", title: "相向出發 (面對面)",
      desc: "橘車 300，綠車 325。兩車相距 1250 公尺，同時相向出發，幾分鐘後會相遇？",
      dist: 1250, bS: 325, rS: 300, a1: 625, a2: 2, f1: "325 + 300 = 625", f2: "1250 ÷ 625 = 2",
      word: "共同縮短", bPos: 5, rPos: 88, bDir: -1, rDir: 1, bName: "綠車", rName: "橘車"
    },
    {
      type: "反向", title: "反方向出發 (背對背)",
      desc: "橘車 300，綠車 325。兩車同時同地反方向出發，3 分鐘後相距幾公尺？",
      dist: 0, bS: 325, rS: 300, a1: 625, a2: 1875, f1: "325 + 300 = 625", f2: "625 × 3 = 1875",
      word: "拉開距離", bPos: 45, rPos: 45, bDir: 1, rDir: -1, bName: "綠車", rName: "橘車"
    },
    {
      type: "同向", title: "同方向出發 (一追一逃)",
      desc: "橘車 300，綠車 325。兩車同時同地同方向出發，2 分鐘後相距幾公尺？",
      dist: 0, bS: 325, rS: 300, a1: 25, a2: 50, f1: "325 - 300 = 25", f2: "25 × 2 = 50",
      word: "拉開距離", bPos: 5, rPos: 5, bDir: -1, rDir: -1, bName: "綠車", rName: "橘車"
    }
  ];

  const q = questions[Math.floor(Math.random() * questions.length)];
  document.getElementById('q-title').innerText = "題目：" + q.title;
  document.getElementById('q-desc').innerText = q.desc;
  document.getElementById('label-blue').innerText = `${q.bName}(${q.bS})`;
  document.getElementById('label-red').innerText = `${q.rName}(${q.rS})`;
  document.getElementById('s1-word').innerText = q.word;
  document.getElementById('label-dist').innerText = q.dist > 0 ? `總距離 ${q.dist}m` : "起點：兩車同地出發";

  const blue = document.getElementById('blue-car');
  const red = document.getElementById('red-car');
  blue.style.left = q.bPos + "%";
  red.style.left = q.rPos + "%";
  document.getElementById('blue-img').style.transform = `scaleX(${q.bDir})`;
  document.getElementById('red-img').style.transform = `scaleX(${q.rDir})`;

  function check1() {
    if(document.getElementById('ans1').value == q.a1) {
      document.getElementById('formula1').innerText = "算式： " + q.f1;
      document.getElementById('formula1').style.display = "block";
      setTimeout(() => { document.getElementById('s1').classList.remove('active'); document.getElementById('s2').classList.add('active'); }, 1200);
    }
  }

  function check2() {
    if(document.getElementById('ans2').value == q.a2) {
      document.getElementById('formula2').innerText = "算式： " + q.f2;
      document.getElementById('formula2').style.display = "block";
      if(q.type === "相向") { blue.style.left = "45%"; red.style.left = "50%"; }
      else if(q.type === "反向") { blue.style.left = "2%"; red.style.left = "88%"; }
      else { blue.style.left = "48%"; red.style.left = "38%"; } // 同向時，綠車跑得遠一點
      document.getElementById('final-summary').innerHTML = `步驟一：${q.f1}<br>步驟二：${q.f2}`;
      setTimeout(() => { document.getElementById('s2').classList.remove('active'); document.getElementById('final').classList.add('active'); }, 2500);
    }
  }
</script>
</body>
</html>
