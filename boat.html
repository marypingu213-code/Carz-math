<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流水實驗室</title>
<style>
  body { font-family: sans-serif; background: #FFF9E3; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  .card { background: white; width: 95vw; height: 90vh; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
  .river { background: #74b9ff; height: 180px; border-radius: 15px; position: relative; margin: 10px 0; border: 4px solid #0984e3; overflow: hidden; }
  .boat { position: absolute; font-size: 60px; transition: all 2s ease-in-out; top: 40px; left: 5%; }
  .label { position: absolute; bottom: 10px; font-weight: bold; background: #ffeaa7; padding: 5px 10px; border-radius: 8px; }
  .step { display: none; background: #F0F7FF; border: 2px solid #74b9ff; border-radius: 15px; padding: 20px; flex: 1; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-top: 10px; }
  .active { display: flex; }
  input { font-size: 24px; width: 100px; text-align: center; border: 2px solid #74b9ff; border-radius: 8px; padding: 5px; margin: 10px; }
  button { background: #0984e3; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <h2 style="text-align:center;">🚢 豪華號流水實驗室</h2>
  <div class="river">
    <div class="label" style="left: 5%;">甲地</div>
    <div class="label" style="right: 5%;">乙地</div>
    <div id="boat" class="boat">🚢</div>
  </div>
  <div id="s1" class="step active">
    <h3>1. 順流而下</h3>
    <p>15 + 3 = <input type="number" id="ans1"> (km/h)</p>
    <button onclick="go1()">出發去乙地</button>
  </div>
  <div id="s2" class="step">
    <h3>2. 兩地距離</h3>
    <p>18 x 4 = <input type="number" id="ans2"> (km)</p>
    <button onclick="go2()">確認距離</button>
  </div>
  <div id="s3" class="step">
    <h3>3. 逆流返回</h3>
    <p>72 ÷ (15-3) = <input type="number" id="ans3"> (小時)</p>
    <button onclick="go3()">回甲地</button>
  </div>
  <div id="final" class="step" style="background: #E8F8F5;">
    <h3>✅ 挑戰成功！</h3>
    <a href="index.html" style="font-weight:bold; color:#5D4037;">🏠 回到大廳</a>
  </div>
</div>
<script>
  function go1() {
    if(document.getElementById('ans1').value == 18) {
      document.getElementById('boat').style.left = "80%";
      setTimeout(() => { document.getElementById('s1').classList.remove('active'); document.getElementById('s2').classList.add('active'); }, 2000);
    }
  }
  function go2() {
    if(document.getElementById('ans2').value == 72) {
      document.getElementById('s2').classList.remove('active'); document.getElementById('s3').classList.add('active');
      document.getElementById('boat').style.transform = "scaleX(-1)";
    }
  }
  function go3() {
    if(document.getElementById('ans3').value == 6) {
      document.getElementById('boat').style.left = "5%";
      setTimeout(() => { document.getElementById('s3').classList.remove('active'); document.getElementById('final').classList.add('active'); }, 2000);
    }
  }
</script>
</body>
</html>
