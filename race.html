<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>追趕問題：實況動態教學</title>
<style>
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #FFF9E3; display: flex; justify-content: center; align-items: center; }
  .card { background: white; width: 95vw; height: 92vh; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
  
  /* 賽道區域 */
  .track { background: #333; flex: 0 0 200px; border-radius: 15px; position: relative; margin: 10px 0; border: 4px solid #555; overflow: visible; }
  .finish-line { position: absolute; left: 70%; top: 0; bottom: 0; width: 15px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 5; }
  .finish-label { position: absolute; left: 69%; bottom: -30px; font-weight: bold; color: #8D6E63; font-size: 1.2rem; }
  
  .runner { position: absolute; font-size: 50px; transition: left 1s linear; z-index: 10; display: flex; flex-direction: column; align-items: center; }
  .runner span { font-size: 14px; color: white; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; margin-top: -5px; }
  #fox { top: 20px; left: 0; }
  #cat { top: 95px; left: 0; }

  /* 互動區域 */
  .step-area { flex: 1; margin-top: 30px; position: relative; }
  .step { display: none; background: #FFFDF0; border: 2px solid #FFD966; border-radius: 15px; padding: 15px; height: 100%; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .active { display: flex; }

  .instruction { font-size: 1.2rem; margin-bottom: 10px; }
  input { font-size: 28px; width: 120px; text-align: center; border: 2px solid #FFD966; border-radius: 10px; padding: 8px; margin: 10px; }
  button { background: #A8D08D; color: white; border: none; padding: 15px 35px; border-radius: 40px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
  .final-msg { color: #e74c3c; font-weight: bold; font-size: 1.3rem; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
  <h2 style="text-align:center; color:#5D4037; margin:0;">🦊 追趕問題：速率與領先距離</h2>
  
  <div class="track">
    <div class="finish-line"></div>
    <div id="fox" class="runner">🦊<span>奇奇(400)</span></div>
    <div id="cat" class="runner">🐱<span>妮妮(320)</span></div>
    <div class="finish-label">🏁 終點 4000m</div>
  </div>

  <div class="step-area">
    <div id="s1" class="step active">
      <div class="instruction"><b>1. 算出兩人的「速率差」：</b></div>
      <p>奇奇每分鐘比妮妮快多少公尺？<br>400 - 320 = <input type="number" id="ans1"> 公尺/分</p>
      <button onclick="check1()">確認速度差</button>
    </div>

    <div id="s2" class="step">
      <div class="instruction"><b>2. 妮妮先騎 960 公尺：</b></div>
      <p>讓妮妮先移動到領先的位置。</p>
      <button onclick="moveCat()">讓妮妮就位</button>
    </div>

    <div id="s3" class="step">
      <div class="instruction"><b>3. 兩人同時騎 12 分鐘：</b></div>
      <p>點擊按鈕，觀察奇奇能不能在終點前追上！</p>
      <button onclick="startRace()">開始追趕！</button>
    </div>

    <div id="final" class="step">
      <div class="final-msg">🚩 妮妮先過終點了！奇奇失敗。</div>
      <p>他們在 4800m 處才追上，但終點在 4000m。<br>所以奇奇在終點前追不到妮妮。</p>
      <a href="index.html" style="font-weight:bold; color:#5D4037; text-decoration:none; border-bottom:2px solid;">🏠 回到大廳</a>
    </div>
  </div>
</div>

<script>
  // 比例尺：70% 的賽道長度代表 4000m
  const trackWidth = document.querySelector('.track').clientWidth;
  const scale = (trackWidth * 0.7) / 4000;

  function check1() {
    if(document.getElementById('ans1').value == 80) {
      document.getElementById('s1').classList.remove('active');
      document.getElementById('s2').classList.add('active');
    } else { alert("再算算看，400 - 320 = ?"); }
  }

  function moveCat() {
    document.getElementById('cat').style.left = (960 * scale) + "px";
    setTimeout(() => {
      document.getElementById('s2').classList.remove('active');
      document.getElementById('s3').classList.add('active');
    }, 1200);
  }

  function startRace() {
    const fox = document.getElementById('fox');
    const cat = document.getElementById('cat');
    
    // 設定動畫時間為 3 秒，模擬 12 分鐘的過程
    fox.style.transition = "left 3s linear";
    cat.style.transition = "left 3s linear";
    
    // 兩人都跑到 4800m 的位置 (追上點)
    fox.style.left = (4800 * scale) + "px";
    cat.style.left = (4800 * scale) + "px";
    
    // 監控妮妮何時過線 (4000m / 4800m * 3000ms ≈ 2500ms)
    setTimeout(() => {
      document.getElementById('s3').classList.remove('active');
      document.getElementById('final').classList.add('active');
    }, 3200);
  }
</script>

</body>
</html>
